name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Test and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests
        run: ./mvnw clean test

      - name: Generate JaCoCo coverage report
        run: ./mvnw jacoco:report

      - name: Check coverage
        run: |
          echo "Coverage Summary:"
          if [ -f target/site/jacoco/index.html ]; then
            echo "JaCoCo report generated successfully"
            echo "Report location: target/site/jacoco/index.html"
          else
            echo "ERROR: JaCoCo report not found"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 30

      - name: Test summary
        if: always()
        run: |
          echo "### Test Results :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d target/surefire-reports ]; then
            TESTS=$(find target/surefire-reports -name "TEST-*.xml" | wc -l)
            echo "Total test files: $TESTS" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage report has been uploaded as an artifact." >> $GITHUB_STEP_SUMMARY

  coverage-check:
    name: Verify Coverage Threshold
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Download coverage report
        uses: actions/download-artifact@v3
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: Verify coverage
        run: |
          echo "Checking 80% coverage requirement..."
          ./mvnw jacoco:check
          echo "Coverage check passed!"

      - name: Coverage summary
        if: always()
        run: |
          echo "### Coverage Summary :chart_with_upwards_trend:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Target: 80% coverage" >> $GITHUB_STEP_SUMMARY
          echo "Status: Verified by JaCoCo" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 7
